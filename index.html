<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أمنكو للتوظيف 🛡️</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 650px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border-right: 10px solid #1a73e8; position: relative; }
        .form-box { background: #ffffff; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e1e8ed; }
        h2 { color: #1a73e8; text-align: center; font-weight: 700; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        button { cursor: pointer; border: none; font-family: 'Tajawal', sans-serif; transition: 0.2s; }
        .btn-main { width: 100%; padding: 14px; background-color: #1a73e8; color: white; border-radius: 10px; font-weight: bold; }
        .btn-excel { width: 100%; padding: 12px; background-color: #218838; color: white; border-radius: 10px; margin-bottom: 15px; }
        .btn-next { width: 100%; padding: 12px; background-color: #ff8c00; color: white; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        .status-section { background: #f8f9fa; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .status-label { font-weight: bold; color: #1a73e8; display: block; margin-bottom: 4px; }
        .time-text { font-size: 11px; color: #dc3545; display: block; }
        .delete-btn { position: absolute; left: 15px; top: 15px; color: #ff4d4d; background: none; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [candidates, setCandidates] = useState(() => {
                const saved = localStorage.getItem('amnco_final_v10');
                return saved ? JSON.parse(saved) : [];
            });
            const [search, setSearch] = useState('');
            const [form, setForm] = useState({ name: '', empId: '', jobTitle: '', dept: 'الحلول الأمنية', project: '', branch: '', salary: '', phone: '', startDay: '' });

            useEffect(() => { localStorage.setItem('amnco_final_v10', JSON.stringify(candidates)); }, [candidates]);

            // التسلسل المطلوب بدقة
            const steps = ["", "قرار التعيين", "إكمال الملف", "الادخال بالنظام", "رفع عقد قوى", "مكتمل ✅"];

            const calcDuration = (start) => {
                const diff = Math.abs(new Date() - new Date(start));
                const mins = Math.floor(diff / 60000);
                const hrs = Math.floor(mins / 60);
                return hrs > 0 ? `${hrs} ساعة و ${mins % 60} دقيقة` : `${mins} دقيقة`;
            };

            const addCandidate = () => {
                // شرط منع تكرار الرقم الوظيفي
                if (candidates.some(c => c.empId === form.empId)) {
                    return alert("⚠️ تنبيه: الرقم الوظيفي مُسجل مسبقاً لموظف آخر!");
                }
                if(!form.name || !form.empId) return alert("يرجى إدخال الاسم والرقم الوظيفي");
                
                const newEntry = { ...form, id: Date.now(), step: 1, lastUpdate: new Date().toISOString() };
                setCandidates([newEntry, ...candidates]);
                setForm({ name: '', empId: '', jobTitle: '', project: '', branch: '', salary: '', phone: '', startDay: '' });
            };

            const handleNext = (id) => {
                setCandidates(candidates.map(c => (c.id === id && c.step < 5) ? { ...c, step: c.step + 1, lastUpdate: new Date().toISOString() } : c));
            };

            return (
                <div className="container">
                    <h2>نظام أمنكو للتوظيف 🛡️</h2>
                    <button className="btn-excel" onClick={() => {
                        const ws = XLSX.utils.json_to_sheet(candidates.map(c => ({ "الاسم": c.name, "ID": c.empId, "المسمى": c.jobTitle, "الفرع": c.branch, "الحالة": steps[c.step] })));
                        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "Amnco.xlsx");
                    }}>📥 تصدير Excel</button>
                    
                    <input style={{border: '2px solid #1a73e8'}} placeholder="🔍 ابحث بالاسم، الرقم، أو الفرع..." onChange={e => setSearch(e.target.value)} />

                    <div className="form-box">
                        <input placeholder="اسم المرشح" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                        <div className="grid">
                            <input placeholder="الرقم الوظيفي (يجب أن يكون فريد)" value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} />
                            <input placeholder="المسمى الوظيفي" value={form.jobTitle} onChange={e => setForm({...form, jobTitle: e.target.value})} />
                        </div>
                        <div className="grid">
                            <select value={form.dept} onChange={e => setForm({...form, dept: e.target.value})}>
                                <option value="الحلول الأمنية">الحلول الأمنية</option>
                                <option value="الحلول النقدية">الحلول النقدية</option>
                            </select>
                            <input placeholder="الفرع" value={form.branch} onChange={e => setForm({...form, branch: e.target.value})} />
                        </div>
                        <button className="btn-main" onClick={addCandidate}>حفظ البيانات</button>
                    </div>

                    {candidates.filter(c => c.name.includes(search) || c.empId.includes(search) || c.branch.includes(search)).map(c => (
                        <div key={c.id} className="card" style={{borderColor: c.dept === 'الحلول النقدية' ? '#9b59b6' : '#1a73e8'}}>
                            <button className="delete-btn" onClick={() => window.confirm("حذف؟") && setCandidates(candidates.filter(x => x.id !== c.id))}>🗑️</button>
                            <strong>{c.name}</strong> <small>({c.empId})</small>
                            <div style={{fontSize: '13px', margin: '5px 0'}}>💼 المسمى: {c.jobTitle} | 📍 الفرع: {c.branch}</div>
                            
                            <div className="status-section">
                                <span className="status-label">المرحلة الحالية: {steps[c.step]}</span>
                                {c.step < 5 && <span className="time-text">⏱️ مستغرق: {calcDuration(c.lastUpdate)}</span>}
                            </div>
                            {c.step < 5 && <button className="btn-next" onClick={() => handleNext(c.id)}>انتقال من ({steps[c.step]}) ➔ للخطوة التالية</button>}
                        </div>
                    ))}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
