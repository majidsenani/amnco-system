<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أمنكو للتوظيف 🛡️</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 650px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border-right: 10px solid #1a73e8; position: relative; }
        .form-box { background: #ffffff; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e1e8ed; }
        h2 { color: #1a73e8; text-align: center; font-weight: 700; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-family: 'Tajawal', sans-serif; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { cursor: pointer; border: none; font-family: 'Tajawal', sans-serif; transition: 0.2s; font-weight: bold; }
        .btn-main { width: 100%; padding: 14px; background-color: #1a73e8; color: white; border-radius: 10px; font-size: 16px; margin-top: 10px; }
        .btn-excel { width: 100%; padding: 12px; background-color: #218838; color: white; border-radius: 10px; margin-bottom: 15px; }
        .btn-next { width: 100%; padding: 12px; background-color: #ff8c00; color: white; border-radius: 8px; margin-top: 10px; }
        .status-section { background: #f8f9fa; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; }
        .status-label { font-weight: bold; color: #1a73e8; display: block; margin-bottom: 4px; }
        .time-text { font-size: 11px; color: #dc3545; display: block; }
        .delete-btn { position: absolute; left: 15px; top: 15px; color: #ff4d4d; background: none; font-size: 20px; font-weight: bold; }
        .field-label { font-size: 12px; color: #666; margin-bottom: 2px; display: block; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [candidates, setCandidates] = useState(() => {
                const saved = localStorage.getItem('amnco_v11_final');
                return saved ? JSON.parse(saved) : [];
            });
            const [search, setSearch] = useState('');
            const [form, setForm] = useState({
                name: '', empId: '', jobTitle: '', dept: 'الحلول الأمنية', project: '', branch: '', 
                startDay: '', salary: '', phone: ''
            });

            useEffect(() => {
                localStorage.setItem('amnco_v11_final', JSON.stringify(candidates));
            }, [candidates]);

            const steps = ["", "قرار التعيين", "إكمال الملف", "الادخال بالنظام", "رفع عقد قوى", "مكتمل ✅"];

            const calcDuration = (start) => {
                const diff = Math.abs(new Date() - new Date(start));
                const mins = Math.floor(diff / 60000);
                const hrs = Math.floor(mins / 60);
                const days = Math.floor(hrs / 24);
                if (days > 0) return `${days} يوم و ${hrs % 24} ساعة`;
                if (hrs > 0) return `${hrs} ساعة و ${mins % 60} دقيقة`;
                return `${mins} دقيقة`;
            };

            const addCandidate = () => {
                if (candidates.some(c => c.empId === form.empId)) {
                    return alert("⚠️ خطأ: هذا الرقم الوظيفي موجود مسبقاً!");
                }
                if(!form.name || !form.empId) return alert("يرجى تعبئة الاسم والرقم الوظيفي على الأقل");
                
                const newEntry = { 
                    ...form, 
                    id: Date.now(), 
                    step: 1, 
                    lastUpdate: new Date().toISOString() 
                };
                setCandidates([newEntry, ...candidates]);
                setForm({ name: '', empId: '', jobTitle: '', dept: 'الحلول الأمنية', project: '', branch: '', startDay: '', salary: '', phone: '' });
            };

            const handleNext = (id) => {
                setCandidates(candidates.map(c => 
                    (c.id === id && c.step < 5) ? { ...c, step: c.step + 1, lastUpdate: new Date().toISOString() } : c
                ));
            };

            const exportExcel = () => {
                const data = candidates.map(c => ({
                    "الاسم": c.name, "ID": c.empId, "المسمى": c.jobTitle, "الإدارة": c.dept,
                    "المشروع": c.project, "الفرع": c.branch, "تاريخ المباشرة": c.startDay,
                    "الراتب": c.salary, "الجوال": c.phone, "الحالة الحالية": steps[c.step]
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "تقرير أمنكو");
                XLSX.writeFile(wb, "Amnco_Recruitment_Report.xlsx");
            };

            return (
                <div className="container">
                    <h2>نظام أمنكو للتوظيف 🛡️</h2>
                    
                    <button className="btn-excel" onClick={exportExcel}>📥 تصدير البيانات إلى Excel</button>
                    
                    <input 
                        style={{border: '2px solid #1a73e8'}} 
                        placeholder="🔍 ابحث بالاسم، الرقم، الفرع أو المشروع..." 
                        onChange={e => setSearch(e.target.value)} 
                    />

                    <div className="form-box">
                        <label className="field-label">اسم الموظف</label>
                        <input placeholder="الاسم الكامل" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                        
                        <div className="grid">
                            <div><label className="field-label">الرقم الوظيفي</label>
                            <input placeholder="ID" value={form.empId} onChange={e => setForm({...form, empId: e.target.value})} /></div>
                            <div><label className="field-label">المسمى الوظيفي</label>
                            <input placeholder="المسمى" value={form.jobTitle} onChange={e => setForm({...form, jobTitle: e.target.value})} /></div>
                        </div>

                        <div className="grid">
                            <div><label className="field-label">الإدارة</label>
                            <select value={form.dept} onChange={e => setForm({...form, dept: e.target.value})}>
                                <option value="الحلول الأمنية">الحلول الأمنية</option>
                                <option value="الحلول النقدية">الحلول النقدية</option>
                            </select></div>
                            <div><label className="field-label">المشروع</label>
                            <input placeholder="اسم المشروع" value={form.project} onChange={e => setForm({...form, project: e.target.value})} /></div>
                        </div>

                        <div className="grid">
                            <div><label className="field-label">الفرع</label>
                            <input placeholder="الفرع" value={form.branch} onChange={e => setForm({...form, branch: e.target.value})} /></div>
                            <div><label className="field-label">الراتب</label>
                            <input placeholder="الراتب" type="number" value={form.salary} onChange={e => setForm({...form, salary: e.target.value})} /></div>
                        </div>

                        <div className="grid">
                            <div><label className="field-label">رقم الجوال</label>
                            <input placeholder="05xxxx" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} /></div>
                            <div><label className="field-label">تاريخ المباشرة</label>
                            <input type="date" value={form.startDay} onChange={e => setForm({...form, startDay: e.target.value})} /></div>
                        </div>

                        <button className="btn-main" onClick={addCandidate}>إضافة الطلب للنظام</button>
                    </div>

                    {candidates.filter(c => 
                        c.name.includes(search) || c.empId.includes(search) || c.branch.includes(search) || c.project.includes(search)
                    ).map(c => (
                        <div key={c.id} className="card" style={{borderColor: c.dept === 'الحلول النقدية' ? '#9b59b6' : '#1a73e8'}}>
                            <button className="delete-btn" onClick={() => window.confirm("هل أنت متأكد من الحذف؟") && setCandidates(candidates.filter(x => x.id !== c.id))}>🗑️</button>
                            
                            <strong>{c.name}</strong> <small>({c.empId})</small>
                            <div style={{fontSize: '13px', marginTop: '8px'}}>
                                💼 {c.jobTitle} | 🏢 {c.dept}
                            </div>
                            <div style={{fontSize: '12px', color: '#666', marginTop: '4px'}}>
                                📍 الفرع: {c.branch} | 🏗️ المشروع: {c.project}
                            </div>
                            <div style={{fontSize: '12px', color: '#666'}}>
                                📅 المباشرة: {c.startDay} | 💰 الراتب: {c.salary}
                            </div>
                            
                            <div className="status-section">
                                <span className="status-label">المرحلة الحالية: {steps[c.step]}</span>
                                {c.step < 5 && <span className="time-text">⏱️ مستغرق في هذه الخطوة: {calcDuration(c.lastUpdate)}</span>}
                            </div>
                            
                            {c.step < 5 && (
                                <button className="btn-next" onClick={() => handleNext(c.id)}>
                                    تمت مرحلة ({steps[c.step]}) ➔ الانتقال للخطوة التالية
                                </button>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
